<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>System Apocalypse: Idle Defender</title>
	<link href="/src/style.css" rel="stylesheet" />
	<script type="module" src="/src/main.js"></script>
</head>
<body class="bg-base-100">
<div id="app" class="container mx-auto p-4 font-sans">
	
	<!-- HEADER -->
	<header id="game-header" class="navbar bg-base-300 rounded-box shadow-lg mb-4"></header>
	
	<!-- TABS -->
	<div id="tabs-container" role="tablist" class="tabs tabs-boxed"></div>
	
	<!-- CONTENT AREA -->
	<main id="content-area" class="p-4 bg-base-300 rounded-box mt-4 min-h-screen">
	</main>

</div>

<!-- System Shop Modal with fixed height -->
<dialog id="system-shop-modal" class="modal">
	<div class="modal-box w-11/12 max-w-5xl h-[80vh] flex flex-col p-3">
		<div id="shop-modal-header">
			<!-- Hero name and tokens will be injected here by JS -->
		</div>
		
		<div role="tablist" class="tabs tabs-lifted mt-4 flex-grow min-h-0">
			<input type="radio" name="shop_tabs" role="tab" class="tab" aria-label="Items" checked />
			<div role="tabpanel" class="tab-content bg-base-100 overflow-y-auto rounded-none">
				<div id="shop-modal-items-content" class="grid grid-cols-1 md:grid-cols-2 gap-2">
					<!-- Items for sale will be injected here -->
				</div>
			</div>
			
			<input type="radio" name="shop_tabs" role="tab" class="tab" aria-label="Inventory" />
			<div role="tabpanel" class="tab-content bg-base-100 overflow-y-auto rounded-none">
				<div id="shop-modal-inventory-content" class="grid grid-cols-1 md:grid-cols-2 gap-2">
					<!-- Hero inventory will be injected here -->
				</div>
			</div>
			
			<input type="radio" name="shop_tabs" role="tab" class="tab" aria-label="Skills" />
			<div role="tabpanel" class="tab-content bg-base-100 overflow-y-auto rounded-none">
				<div id="shop-modal-skills-content" class="grid grid-cols-1 md:grid-cols-2 gap-2">
					<!-- Skills for sale will be injected here -->
				</div>
			</div>
			
			<input type="radio" name="shop_tabs" role="tab" class="tab" aria-label="Building Upgrades" />
			<div role="tabpanel" class="tab-content bg-base-100 overflow-y-auto rounded-none">
				<div id="shop-modal-building-upgrades-content" class="grid grid-cols-1 md:grid-cols-2 gap-2">
					<!-- Building upgrades for sale will be injected here -->
				</div>
			</div>
			
			<input type="radio" name="shop_tabs" role="tab" class="tab" aria-label="Car Upgrades" />
			<div role="tabpanel" class="tab-content bg-base-100 overflow-y-auto rounded-none">
				<div id="shop-modal-car-upgrades-content" class="grid grid-cols-1 md:grid-cols-2 gap-2">
					<!-- Car upgrades for sale will be injected here -->
				</div>
			</div>
		</div>
		
		<div class="modal-action mt-4">
			<form method="dialog">
				<button class="btn">Close</button>
			</form>
		</div>
	</div>
</dialog>


<!-- Building Upgrade Modal -->
<dialog id="building-upgrade-modal" class="modal">
	<div class="modal-box w-11/12 max-w-3xl">
		<div id="upgrade-modal-header">
			<!-- Building name and party tokens will be injected here by JS -->
		</div>
		<div class="mt-4 max-h-[70vh] overflow-y-auto pr-2">
			<div class="divider my-2">Available Upgrades</div>
			<div id="upgrade-modal-content" class="grid grid-cols-1 md:grid-cols-2 gap-2">
				<!-- Building upgrades will be injected here by JS -->
			</div>
		</div>
		<div class="modal-action">
			<form method="dialog">
				<button class="btn">Close</button>
			</form>
		</div>
	</div>
</dialog>

<!-- Car Purchase Modal -->
<dialog id="car-purchase-modal" class="modal">
	<div class="modal-box w-11/12 max-w-md">
		<div id="car-purchase-modal-header" class="flex justify-between items-center">
			<!-- Car name and price will be injected here -->
		</div>
		<p class="py-4">Select a hero to purchase this vehicle. The cost will be deducted from their personal token balance.</p>
		<div id="car-purchase-heroes-list" class="flex flex-col gap-2">
			<!-- Hero buttons will be injected here by JS -->
		</div>
		<div class="modal-action mt-4">
			<form method="dialog">
				<button class="btn">Cancel</button>
			</form>
		</div>
	</div>
</dialog>


<!-- TEMPLATES -->
<template id="header-template">
	<div class="navbar-start"><div class="font-bold text-xl p-2">System Apocalypse: Idle Defender</div></div>
	<div class="navbar-center hidden lg:flex">
		<div class="stats bg-transparent shadow-none">
			<div class="stat"><div class="stat-title">In-Game Time</div><div class="stat-value text-lg" data-stat="time"></div></div>
			<div class="stat"><div class="stat-title">Game Ticks</div><div class="stat-value text-lg" data-stat="ticks"></div></div>
			<div class="stat"><div class="stat-title">Pop</div><div class="stat-value text-lg text-success" data-stat="population"></div></div>
		</div>
	</div>
	<div class="navbar-end flex items-center gap-4">
		<!-- MODIFIED: Added game speed controls -->
		<div class="btn-group" id="speed-controls">
			<button class="btn btn-sm" data-speed="0.5">1/2x</button>
			<button class="btn btn-sm" data-speed="1">1x</button>
			<button class="btn btn-sm" data-speed="2">2x</button>
			<button class="btn btn-sm" data-speed="4">4x</button>
		</div>
		<div class="dropdown dropdown-end">
			<div tabindex="0" role="button" class="btn btn-accent">System Shop</div>
			<ul tabindex="0" id="header-shop-dropdown-list" class="dropdown-content z-[1] menu p-2 shadow bg-base-100 rounded-box w-52">
				<!-- Hero list for the shop will be injected here by JS -->
			</ul>
		</div>
	</div>
</template>

<template id="hero-card-template">
	<div class="card bg-base-200 shadow-xl">
		<div class="card-body p-4">
			<div class="flex justify-between items-start">
				<div>
					<h2 class="card-title text-lg" data-name></h2>
					<!-- Hero status line -->
					<p class="text-sm text-gray-400 min-h-5" data-hero-status></p>
				</div>
				<!-- Container for class and token badges -->
				<div class="flex flex-col items-end gap-1">
					<div class="badge" data-class></div>
				</div>
			</div>
			
			<!-- Container for multi-slot equipment (now shows images) -->
			<div class="text-xs text-gray-400 mb-2 flex flex-wrap gap-1" data-equipment-container>
				<!-- Equipment will be rendered here by JS -->
			</div>
			
			<!-- Stat bars -->
			<div class="flex justify-between items-center my-1">
				<span class="label-text text-xs" data-xp-label></span>
				<progress class="progress progress-primary w-[40%]" data-xp-bar></progress>
			</div>
			<div class="flex justify-between items-center my-1">
				<span class="label-text text-xs" data-hp-label></span>
				<progress class="progress progress-success w-[40%]" data-hp-bar></progress>
			</div>
			<div class="flex justify-between items-center my-1" data-mp-container>
				<span class="label-text text-xs" data-mp-label></span>
				<progress class="progress progress-info w-[40%]" data-mp-bar></progress>
			</div>
			<div class="flex justify-between items-center my-1" data-rage-container style="display: none;">
				<span class="label-text text-xs" data-rage-label></span>
				<progress class="progress progress-error w-[40%]" data-rage-bar></progress>
			</div>
			
			<!-- Skill Progression Area -->
			<div class="mt-2 border-t border-base-300 pt-2" data-skills-container>
				<div class="divider my-1">Skills</div>
				<div class="grid grid-cols-2 gap-2" data-skills-list>
					<!-- Skill cards will be rendered here by JS -->
				</div>
			</div>
		</div>
	</div>
</template>
</body>
</html>
